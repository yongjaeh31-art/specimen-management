<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}검체 라우팅{% endblock %} — LIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="app-navbar">
  <div class="navbar-top-bar">
    <a class="app-brand" href="/dashboard">
      <div class="brand-icon"><i class="bi bi-activity"></i></div>
      <div class="brand-text">
        검체관리프로그램
        <small>Laboratory Information System</small>
      </div>
    </a>
    <div class="navbar-user-area">
      <span class="realtime-clock" id="realtimeClock"></span>
      <span id="currentUserBadge" class="user-badge d-none">
        <i class="bi bi-person-circle"></i>
        <span id="currentUserName"></span>
      </span>
      <a class="btn-nav-login" href="/login" id="loginLink"><i class="bi bi-box-arrow-in-right me-1"></i>로그인</a>
      <button class="btn-nav-login d-none" id="logoutButton" type="button"><i class="bi bi-box-arrow-right me-1"></i>로그아웃</button>
    </div>
  </div>

  <ul class="navbar-nav-tabs">
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/upload' %}active{% endif %}" href="/upload">
        <i class="bi bi-upload"></i>접수리스트 업로드
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/scan' %}active{% endif %}" href="/scan">
        <i class="bi bi-upc-scan"></i>검체 조회/도착
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/micro' %}active{% endif %}" href="/micro">
        <i class="bi bi-grid-3x3-gap"></i>학부별 소분류
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/urine' %}active{% endif %}" href="/urine">
        <i class="bi bi-droplet-fill"></i>Urine 출력
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/find' %}active{% endif %}" href="/find">
        <i class="bi bi-search"></i>검체 찾기
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/missing' %}active{% endif %}" href="/missing">
        <i class="bi bi-exclamation-triangle"></i>누락검체
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/unregistered' %}active{% endif %}" href="/unregistered">
        <i class="bi bi-question-circle"></i>미접수검체
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/branch-rack' %}active{% endif %}" href="/branch-rack">
        <i class="bi bi-diagram-3"></i>지사별 검체 확인
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">
        <i class="bi bi-speedometer2"></i>대시보드
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/admin/users' %}active{% endif %}" href="/admin/users">
        <i class="bi bi-people"></i>사용자 승인
      </a>
    </li>
  </ul>
</nav>

<main class="app-main container-fluid">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
(function () {
  const user = JSON.parse(localStorage.getItem("currentUser") || "null");
  // 로그인 필수: 미인증 시 로그인 페이지로 이동 (관리자 승인 페이지는 예외)
  if (!user && window.location.pathname !== "/admin/users") {
    window.location.replace("/login");
    return;
  }
  const badge = document.getElementById("currentUserBadge");
  const nameEl = document.getElementById("currentUserName");
  const loginLink = document.getElementById("loginLink");
  const logoutBtn = document.getElementById("logoutButton");
  badge.classList.remove("d-none");
  nameEl.textContent = user.display_name;
  loginLink.classList.add("d-none");
  logoutBtn.classList.remove("d-none");
  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("currentUser");
    localStorage.removeItem("pcName");
    window.location.href = "/login";
  });
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
