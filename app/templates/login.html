<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 검체 라우팅 LIS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <!-- 헤더 -->
    <div class="login-card-header">
      <div class="brand-icon"><i class="bi bi-activity"></i></div>
      <h1>검체 자동 라우팅</h1>
      <p>Laboratory Information System</p>
    </div>

    <!-- 바디 -->
    <div class="login-card-body">

      <!-- 로그인 폼 -->
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">아이디</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input class="form-control" name="username" autocomplete="username"
                   placeholder="아이디를 입력하세요" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">비밀번호</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input class="form-control" name="password" type="password"
                   autocomplete="current-password" placeholder="비밀번호를 입력하세요" required>
          </div>
        </div>
        <button class="btn btn-primary w-100 py-2 fw-bold" type="submit" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-2"></i>로그인
        </button>
      </form>

      <div class="login-divider">신규 사용자 등록</div>

      <!-- 회원가입 폼 -->
      <form id="registerForm">
        <div class="row g-2 mb-2">
          <div class="col-6">
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-at"></i></span>
              <input class="form-control" name="username" placeholder="아이디" required>
            </div>
          </div>
          <div class="col-6">
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
              <input class="form-control" name="display_name" placeholder="이름" required>
            </div>
          </div>
        </div>
        <div class="input-group input-group-sm mb-2">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input class="form-control" name="password" type="password" placeholder="비밀번호 (4자 이상)" required>
        </div>
        <button class="btn btn-outline-primary w-100" type="submit" id="registerBtn">
          <i class="bi bi-person-plus me-1"></i>승인 요청
        </button>
      </form>

      <div id="authMessage" class="mt-3"></div>

      <div class="mt-4 p-3 rounded" style="background:var(--gray-50);font-size:.78rem;color:var(--gray-600)">
        <i class="bi bi-info-circle me-1"></i>
        등록 후 관리자가 승인해야 로그인할 수 있습니다.
      </div>
    </div>
  </div>
</div>

<!-- PC 등록 모달 (로그인 후 PC명 미등록 시) -->
<div class="modal fade" id="pcModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px">
    <div class="modal-content">
      <div class="modal-header border-0 pb-1">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-pc-display me-2 text-primary"></i>PC 등록
        </h5>
      </div>
      <div class="modal-body">
        <p class="text-secondary mb-3" style="font-size:.88rem">
          이 PC에서 처음 접속했습니다.<br>
          Windows PC 이름을 입력하면 자동으로 등록됩니다.
        </p>
        <div class="input-group mb-2">
          <span class="input-group-text"><i class="bi bi-pc-display"></i></span>
          <input class="form-control" id="pcNameInput" placeholder="PC 이름 (예: LAB-PC01)" maxlength="60" autocomplete="off">
        </div>
        <div id="pcRegMessage"></div>
      </div>
      <div class="modal-footer border-0 pt-1">
        <button class="btn btn-primary w-100 fw-bold" id="pcRegBtn" type="button">
          <i class="bi bi-check-circle me-2"></i>등록 후 시작
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
<script>
// ── PC 등록 헬퍼 ─────────────────────────────────────────────────────────────
async function registerPC(pcName, operatorName) {
  return await postJson("/api/auth/pc-register", {
    pc_name: pcName,
    registered_by: operatorName,
  });
}

async function afterLoginFlow(user) {
  localStorage.setItem("currentUser", JSON.stringify(user));
  localStorage.setItem("operatorName", user.display_name);

  const savedPC = localStorage.getItem("pcName");
  if (savedPC) {
    // 이미 PC명 있음 → DB 자동 확인·등록 후 이동
    await registerPC(savedPC, user.display_name).catch(() => {});
    localStorage.setItem("workstationName", savedPC);  // scan/micro 페이지와 키 동기화
    window.location.href = "/scan";
  } else {
    // PC명 없음 → 모달 표시
    new bootstrap.Modal(document.getElementById("pcModal")).show();
    document.getElementById("pcNameInput").focus();
  }
}

// ── 로그인 ────────────────────────────────────────────────────────────────────
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const form = e.target;
  const btn  = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>로그인 중…';
  try {
    const user = await postJson("/api/auth/login", {
      username: form.username.value.trim(),
      password: form.password.value,
    });
    showToast("로그인 완료", `${user.display_name}님 환영합니다.`, "success");
    await afterLoginFlow(user);
  } catch (err) {
    document.getElementById("authMessage").innerHTML =
      `<div class="alert alert-danger mb-0"><i class="bi bi-x-circle me-2"></i>${escapeHtml(err.message)}</div>`;
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>로그인';
  }
});

document.getElementById("registerForm").addEventListener("submit", async e => {
  e.preventDefault();
  const form = e.target;
  const btn  = document.getElementById("registerBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>요청 중…';
  try {
    await postJson("/api/auth/register", {
      username:     form.username.value.trim(),
      display_name: form.display_name.value.trim(),
      password:     form.password.value,
    });
    form.reset();
    document.getElementById("authMessage").innerHTML =
      `<div class="alert alert-success mb-0"><i class="bi bi-check-circle me-2"></i>등록 요청이 완료되었습니다. 관리자 승인 후 로그인할 수 있습니다.</div>`;
  } catch (err) {
    document.getElementById("authMessage").innerHTML =
      `<div class="alert alert-danger mb-0"><i class="bi bi-x-circle me-2"></i>${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-person-plus me-1"></i>승인 요청';
  }
});

// ── PC 등록 모달 ──────────────────────────────────────────────────────────────
document.getElementById("pcRegBtn").addEventListener("click", async () => {
  const input = document.getElementById("pcNameInput");
  const msg   = document.getElementById("pcRegMessage");
  const btn   = document.getElementById("pcRegBtn");
  const pcName = input.value.trim();
  if (!pcName) {
    msg.innerHTML = `<div class="alert alert-warning py-1 mb-0" style="font-size:.82rem"><i class="bi bi-exclamation-triangle me-1"></i>PC 이름을 입력해주세요.</div>`;
    input.focus();
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>등록 중…';
  try {
    const user   = JSON.parse(localStorage.getItem("currentUser") || "{}");
    const result = await registerPC(pcName, user.display_name || "");
    localStorage.setItem("pcName", pcName);
    localStorage.setItem("workstationName", pcName);  // scan/micro 페이지와 키 동기화
    const isNew  = result.status === "registered";
    msg.innerHTML = `<div class="alert alert-success py-1 mb-0" style="font-size:.82rem">
      <i class="bi bi-check-circle me-1"></i>
      ${isNew ? `<strong>${escapeHtml(pcName)}</strong> 자동 등록 완료` : `<strong>${escapeHtml(pcName)}</strong> 이미 등록된 PC`}
    </div>`;
    setTimeout(() => { window.location.href = "/scan"; }, 800);
  } catch (err) {
    msg.innerHTML = `<div class="alert alert-danger py-1 mb-0" style="font-size:.82rem"><i class="bi bi-x-circle me-1"></i>${escapeHtml(err.message)}</div>`;
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>등록 후 시작';
  }
});

// Enter 키로 PC 등록
document.getElementById("pcNameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("pcRegBtn").click();
});
</script>
</body>
</html>
